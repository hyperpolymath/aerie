# Podman Compose file for Aerie's core services
#
# To run: podman-compose up -d
# To stop: podman-compose down
#
# This file defines the three core, non-proprietary services for the Aerie suite.
# Images are official or from trusted providers as Chainguard images are not available.

version: "3.8"

services:
  gateway:
    build:
      context: .
      dockerfile: Containerfile
    container_name: aerie-gateway
    ports:
      - "4000:4000"   # REST + GraphQL
      - "4001:4001"   # gRPC
    environment:
      - PORT=4000
      - GRPC_PORT=4001
      - REDIS_URL=redis://redis:6379
      - LIBRESPEED_URL=http://librespeed:80
      - HYPERGLASS_URL=http://hyperglass:80
    depends_on:
      - librespeed
      - smokeping
      - redis
      - hyperglass
    networks:
      - aerie-net
    restart: unless-stopped
    security_opt:
      - label=disable

  librespeed:
    image: docker.io/linuxserver/librespeed:latest
    container_name: aerie-librespeed
    # No host port — only reachable via aerie-net (gateway proxies all access)
    networks:
      - aerie-net
    restart: unless-stopped
    security_opt:
      - label=disable

  smokeping:
    image: docker.io/linuxserver/smokeping:latest
    container_name: aerie-smokeping
    # No host port — only reachable via aerie-net (gateway proxies all access)
    volumes:
      - smokeping-config:/config
      - smokeping-data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    networks:
      - aerie-net
    restart: unless-stopped
    security_opt:
      - label=disable
    cap_add:
      - NET_RAW

  redis:
    image: docker.io/redis:alpine
    container_name: aerie-redis
    volumes:
      - redis-data:/data
    networks:
      - aerie-net
    restart: unless-stopped
    security_opt:
      - label=disable

  hyperglass:
    build:
      context: ./src/hyperglass
    container_name: aerie-hyperglass
    # No host port — only reachable via aerie-net (gateway proxies all access)
    volumes:
      - hyperglass-config:/app/config
    environment:
      - HYPERGLASS_HOST=0.0.0.0
      - HYPERGLASS_PORT=80
    networks:
      - aerie-net
    restart: unless-stopped
    security_opt:
      - label=disable

networks:
  aerie-net:
    name: aerie-net

volumes:
  smokeping-config:
    name: aerie-smokeping-config
  smokeping-data:
    name: aerie-smokeping-data
  hyperglass-config:
    name: aerie-hyperglass-config
  redis-data:
    name: aerie-redis-data
