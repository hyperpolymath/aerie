type Query {
  telemetrySnapshot: TelemetryPayload!
  routeForensicsSnapshot(target: String!): RouteForensicsPayload!
  auditSnapshot(limit: Int = 50): AuditPayload!
  smokePingSnapshot(target: String!): SmokePingPayload!
  temporalAuditSnapshot(mode: String!, time: String, start: String, end: String, eventId: String, limit: Int = 50): TemporalAuditPayload!
}

type TelemetryPayload {
  data: [TelemetrySample!]!
}

type TelemetrySample {
  timestamp: String!
  latencyMs: Float!
  jitterMs: Float!
  packetLoss: Float!
}

type RouteForensicsPayload {
  path: [RouteHop!]!
}

type RouteHop {
  hop: Int!
  ip: String!
  asn: String
  rttMs: Float
}

type AuditPayload {
  events: [AuditEvent!]!
}

type AuditEvent {
  eventId: ID!
  validTime: String!
  txTime: String!
  severity: String!
  message: String!
  tags: [String!]!
}

type SmokePingPayload {
  target: String!
  current: SmokePingSample!
  chart: [SmokeChartPoint!]!
}

type SmokePingSample {
  timestamp: String!
  target: String!
  medianMs: Float!
  lossPct: Float!
  minMs: Float!
  maxMs: Float!
  stddevMs: Float!
}

type SmokeChartPoint {
  timestamp: String!
  medianMs: Float!
  lossPct: Float!
}

type TemporalAuditPayload {
  mode: String!
  events: [AuditEvent!]!
}
