syntax = "proto3";

package aerie.api.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// --- Proof Envelopes ---

message ProofEnvelope {
  string result_hash = 1;
  string policy_hash = 2;
  string query_id = 3;
  google.protobuf.Timestamp issued_at = 4;
  string proof_type = 5; // "light" | "full"
  string signature = 6;
  google.protobuf.Value a2ml_attestation = 7;
  google.protobuf.Value vql_proof = 8;
}

// --- Data Types ---

message TelemetrySample {
  google.protobuf.Timestamp timestamp = 1;
  double latency_ms = 2;
  double jitter_ms = 3;
  double packet_loss = 4;
}

message RouteHop {
  int32 hop = 1;
  string ip = 2;
  string asn = 3;
  double rtt_ms = 4;
}

message AuditEvent {
  string event_id = 1;
  google.protobuf.Timestamp valid_time = 2;
  google.protobuf.Timestamp tx_time = 3;
  string severity = 4;
  string message = 5;
  repeated string tags = 6;
}

// --- Payloads ---

message TelemetryPayload {
  repeated TelemetrySample data = 1;
  ProofEnvelope proof = 2;
}

message RouteForensicsPayload {
  repeated RouteHop path = 1;
  ProofEnvelope proof = 2;
}

message AuditPayload {
  repeated AuditEvent events = 1;
  ProofEnvelope proof = 2;
}

// --- SmokePing Types (Phase 2) ---

message SmokePingSample {
  google.protobuf.Timestamp timestamp = 1;
  string target = 2;
  double median_ms = 3;
  double loss_pct = 4;
  double min_ms = 5;
  double max_ms = 6;
  double stddev_ms = 7;
}

message SmokeChartPoint {
  google.protobuf.Timestamp timestamp = 1;
  double median_ms = 2;
  double loss_pct = 3;
}

message SmokePingPayload {
  string target = 1;
  SmokePingSample current = 2;
  repeated SmokeChartPoint chart = 3;
  ProofEnvelope proof = 4;
}

message SmokePingRequest {
  string target = 1;
}

// --- VerisimDB Bitemporal Types (Phase 2) ---

// TemporalAuditRequest enables bitemporal forensics queries against
// the VerisimDB cold store. Three query modes are supported:
//   - "as_of":   point-in-time snapshot (what did we know at time T?)
//   - "between": range query (what happened between T1 and T2?)
//   - "history": full lineage of a specific event by ID
message TemporalAuditRequest {
  string mode = 1;      // "as_of" | "between" | "history"
  string time = 2;      // for as_of mode: RFC 3339 timestamp
  string start = 3;     // for between mode: RFC 3339 range start
  string end = 4;       // for between mode: RFC 3339 range end
  string event_id = 5;  // for history mode: UUID of event to trace
  int32 limit = 6;      // max events to return (default 50)
}

// TemporalAuditPayload wraps the bitemporal query results with
// the query mode and a proof envelope for tamper detection.
message TemporalAuditPayload {
  string mode = 1;
  repeated AuditEvent events = 2;
  ProofEnvelope proof = 3;
}

// --- Service Definitions ---

service AerieService {
  rpc GetTelemetrySnapshot(TelemetryRequest) returns (TelemetryPayload);
  rpc GetRouteForensicsSnapshot(RouteForensicsRequest) returns (RouteForensicsPayload);
  rpc GetAuditSnapshot(AuditRequest) returns (AuditPayload);
  rpc GetSmokePingSnapshot(SmokePingRequest) returns (SmokePingPayload);
  rpc GetTemporalAuditSnapshot(TemporalAuditRequest) returns (TemporalAuditPayload);

  rpc StreamTelemetry(TelemetryRequest) returns (stream TelemetryPayload);
  rpc StreamRouteForensics(RouteForensicsRequest) returns (stream RouteForensicsPayload);
  rpc StreamAudit(AuditRequest) returns (stream AuditPayload);
  rpc StreamSmokePing(SmokePingRequest) returns (stream SmokePingPayload);
}

message TelemetryRequest {}

message RouteForensicsRequest {
  string target = 1;
}

message AuditRequest {
  int32 limit = 1;
}
